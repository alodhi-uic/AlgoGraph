# The hardcoded value is the fallback so the project works on a clean clone.
# Set AKKA_LICENSE_KEY in your shell profile to override without editing this file:
#   export AKKA_LICENSE_KEY="<your-key>"
# akka.license-key = "3CecWl2Xo1c4ed376Bqyym4JDCWNkIvvB4uZpkc5MPsC8QeXiY6nVAr4Talgbcyxgk8gtMyebgqhB0BJV1JZTLu4FkZYDSoHiz72nGX4BK4xfR160Qc3yU8GdLEYwLCERp5cHVgpKAPK6kwD7Ta6Ex65zl2b0msY3ROnjIA3b1KH"
akka.license-key = ${?AKKA_LICENSE_KEY}

# ── Cinnamon (Lightbend Telemetry) instrumentation ─────────────────────────
# Instruments all user actors under /user/* and records per-actor message
# throughput, processing time, and mailbox size.  JVM and dispatcher metrics
# are also collected automatically.
cinnamon {
  akka.actors {
    default-by-class {
      includes = "/user/*"
      report-by = class
    }
  }

  akka.dispatchers {
    basic-information {
      names = ["akka.actor.default-dispatcher"]
    }
  }

  akka.remote.serialization-timing = on

  chmetrics {
    reporters += "console-reporter"
  }
}

sim {
  # Directory where NetGameSim writes graph artifacts.
  # The app auto-picks the most recently modified .ngs.dot file found here.
  # Path is relative to the project root (sbt forks with baseDirectory = root).
  # Points to the committed sample graph by default so the simulation runs on a
  # clean clone without needing NetGameSim.  Override at runtime with:
  #   -Dsim.graphDirectory=netgamesim/output   (after generating your own graph)
  # graphDirectory = "sample-graphs" #App.scala:23
  graphDirectory = "netgamesim/output"

  # Pin to a specific graph file instead of auto-picking the most recently modified one.
  # When set, graphDirectory is ignored.  Uncomment ONE line to select a sample graph:
  # graphFile = "sample-graphs/tree-10nodes.ngs.dot"
  # graphFile = "sample-graphs/ring-10nodes-hs.ngs.dot"

  # How long to run the simulation before shutting down (milliseconds).
  runDurationMs = 6000

  # Random seed for traffic generation.  Each NodeActor uses (seed XOR nodeId) so
  # nodes produce independent but reproducible message sequences.  Change this value
  # to run the same graph with a different traffic pattern.
  seed = 42

  # ── Message types ──────────────────────────────────────────────────────────
  # The full vocabulary of application-level message kinds used in this run.
  messages {
    types = ["PING", "GOSSIP", "WORK", "ACK", "CONTROL"]
  }

  # ── Background traffic ─────────────────────────────────────────────────────
  traffic {
    # Default probability mass function over message types.
    # Values must be non-negative and sum to 1.0 ± 1e-6.
    defaultPdf = [
      { msg = "PING",   p = 0.50 },
      { msg = "GOSSIP", p = 0.30 },
      { msg = "WORK",   p = 0.20 }
    ]

    # Per-node PDF overrides.  An empty list means all nodes use defaultPdf.
    # Example: { node = 3, pdf = [{ msg = "WORK", p = 0.80 }, { msg = "PING", p = 0.20 }] }
    perNodePdf = []
  }

  # ── Computation initiators ─────────────────────────────────────────────────
  initiators {
    # Timer nodes emit one message every tickEveryMs milliseconds.
    #   mode = "pdf"   → sample the message kind from the node PDF
    #   mode = "fixed" → always send fixedMsg (add fixedMsg key when using this mode)
    timers = [
      { node = 0, tickEveryMs = 1000, mode = "pdf" }
    ]

    # Input nodes accept externally injected messages from the CLI driver.
    inputs = [
      { node = 1 },
      { node = 2 }
    ]
  }

  # ── Edge label constraints ─────────────────────────────────────────────────
  edgeLabeling {
    # Message kinds permitted on every edge by default.
    # Algorithm control messages (HS_PROBE, TREE_MSG, etc.) always bypass
    # these labels and are never blocked.
    default = ["PING", "CONTROL", "GOSSIP", "WORK"]

    # Per-edge overrides — replaces the default for that specific directed edge.
    # Example: { from = 0, to = 1, allow = ["PING", "CONTROL"] }
    overrides = []
  }

  # ── External message injection ─────────────────────────────────────────────
  injection {
    # "file"        — inject messages listed in `file` (one per line, sorted by delayMs)
    # "interactive" — read commands from stdin: <nodeId> <kind> <payload>
    #                 Requires launching from inside the sbt shell:
    #                   $ sbt          ← enter shell
    #                   > simCli/run   ← run from inside, stdin is forwarded
    mode = "file"

    # Path to the injection script (relative to working directory or absolute).
    # Line format:  <delayMs>  <nodeId>  <kind>  <payload>
    # Lines starting with # are ignored.
    file = "sim-cli/inputs/inject.txt"
  }
}
